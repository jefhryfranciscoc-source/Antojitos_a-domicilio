<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repartidor - Antojitos Pueblo Nuevo</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        :root { --naranja: #e67e22; --verde: #2ecc71; --rojo: #e74c3c; --oscuro: #2c3e50; --gris: #f4f7f6; --azulMaps: #4285F4;}
        body { font-family: 'Segoe UI', sans-serif; background: var(--gris); margin: 0; padding: 15px; }
        .hidden { display: none !important; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        
        input[type="text"], input[type="tel"] { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        
        /* Estilo para el Checkbox de términos */
        .terminos-box { display: flex; align-items: flex-start; gap: 10px; margin: 15px 0; font-size: 0.85em; color: #555; text-align: left; }
        .terminos-box input { margin-top: 3px; transform: scale(1.2); }

        .pedido-card { background: white; border-left: 5px solid var(--naranja); padding: 15px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 3px 10px rgba(0,0,0,0.05); position: relative; }
        .pedido-activo { border-left-color: var(--verde); background: #f0fff4; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; color: white; cursor: pointer; transition: 0.3s; text-align: center; display: block; text-decoration: none; margin-top: 10px; box-sizing: border-box;}
        .btn-acc { background: var(--verde); }
        .btn-maps { background: var(--azulMaps); display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 0.9em; margin-bottom: 10px; }
        .btn-rechazar { background: var(--rojo); padding: 10px; font-size: 0.85em; margin-top: 5px; }
        .timer-tag { position: absolute; top: 10px; right: 10px; font-size: 0.7em; background: #ffebee; color: var(--rojo); padding: 2px 8px; border-radius: 10px; font-weight: bold; }
        .badge { background: var(--naranja); color: white; padding: 3px 8px; border-radius: 5px; font-size: 0.8em; }
        .comision-box { background: #fff3e0; border: 1px solid var(--naranja); padding: 10px; border-radius: 12px; margin-bottom: 15px; text-align: center; font-size: 0.85em; color: #e65100; }
    </style>
</head>
<body>

    <div id="pantallaRegistro" class="hidden card">
        <h2 style="text-align:center; color:var(--oscuro);">Registro de Repartidor</h2>
        <p style="font-size:0.9em; color:gray; text-align: center;">Únete al equipo de Antojitos Pueblo Nuevo</p>
        
        <input type="text" id="regNombre" placeholder="Tu nombre completo">
        <input type="tel" id="regTelefono" placeholder="Número de celular (WhatsApp)">
        
        <div class="terminos-box">
            <input type="checkbox" id="checkComision">
            <label for="checkComision">
                Acepto compartir el <b><span class="val-comision-text">15</span>%</b> de comisión administrativa solicitada por el administrador por cada pedido realizado.
            </label>
        </div>

        <button class="btn btn-acc" onclick="registrarTrabajador()">ENVIAR SOLICITUD</button>
    </div>

    <div id="pantallaPrincipal" class="hidden">
        <div class="comision-box">📢 Tu comisión actual: <b id="val-comision">--</b>%</div>
        
        <button onclick="document.getElementById('visorMenu').classList.toggle('hidden')" class="btn" style="background: #e0e0e0; color: var(--oscuro); margin-bottom: 15px;">🍔 CONSULTAR MENÚ ACTUAL</button>
        <div id="visorMenu" class="hidden card">
            <h4 style="margin-top:0; color:var(--oscuro);">Menú Disponible Hoy:</h4>
            <div id="listaMenuInterno">Cargando...</div>
        </div>

        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h3 id="tituloSeccion" style="color:var(--oscuro)">📦 Pedidos</h3>
            <div id="userTag" style="font-size:0.7em; background:var(--oscuro); color:white; padding:5px 10px; border-radius:20px;"></div>
        </div>
        <div id="listaPedidos">Buscando pedidos...</div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAxWMSIqoS1ZXgAO3rOIiOMCrAaAZjDiao",
        authDomain: "antojitos-pueblo-nuevo.firebaseapp.com",
        projectId: "antojitos-pueblo-nuevo",
        storageBucket: "antojitos-pueblo-nuevo.appspot.com",
        messagingSenderId: "1006413360329",
        appId: "1:1006413360329:web:99103e89833729cc2e3118"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let miId = localStorage.getItem("repartidor_id");
    let miEstado = "DISPONIBLE";
    let miNombreUser = "";
    let porcentajeComisionGlobal = 15;
    let temporizadores = {};
    let pedidosRechazados = JSON.parse(localStorage.getItem("pedidos_rechazados") || "[]");

    window.onload = () => { 
        escucharConfigGlobal(); // Cargar comisión antes de que alguien se registre
        verificarSesion();
        escucharMenuParaRepartidor();
    };

    async function registrarTrabajador() {
        const nombre = document.getElementById('regNombre').value;
        const tel = document.getElementById('regTelefono').value;
        const acepto = document.getElementById('checkComision').checked;

        if(!nombre || !tel) return alert("Por favor, ingresa tu nombre y teléfono.");
        if(!acepto) return alert("Debes aceptar el porcentaje de comisión para trabajar con nosotros.");

        try {
            const docRef = await db.collection("usuarios").add({
                usuario: nombre,
                telefono: tel,
                rol: "REPARTIDOR",
                aprobado: false, 
                acepta_comision: true,
                comision_pactada: porcentajeComisionGlobal,
                estado_reparto: "DISPONIBLE",
                fecha_registro: new Date()
            });
            localStorage.setItem("repartidor_id", docRef.id);
            location.reload();
        } catch(e) { alert("Error al enviar la solicitud."); }
    }

    function verificarSesion() {
        if (!miId) {
            document.getElementById('pantallaRegistro').classList.remove('hidden');
            return;
        }
        
        db.collection("usuarios").doc(miId).onSnapshot(doc => {
            if (doc.exists) {
                const u = doc.data();
                if(!u.aprobado) {
                    document.getElementById('pantallaPrincipal').classList.remove('hidden');
                    document.getElementById('listaPedidos').innerHTML = `
                        <div class='card' style='text-align:center;'>
                            <h3 style='color:var(--naranja)'>⏳ Solicitud Enviada</h3>
                            <p>Hola <b>${u.usuario}</b>, tu cuenta está en espera de aprobación por el administrador.</p>
                        </div>`;
                    return;
                }
                miNombreUser = u.usuario;
                miEstado = u.estado_reparto || "DISPONIBLE";
                document.getElementById('userTag').innerText = `@${u.usuario} (${miEstado})`;
                document.getElementById('pantallaPrincipal').classList.remove('hidden');
                escucharPedidos();
            } else {
                localStorage.removeItem("repartidor_id");
                location.reload();
            }
        });
    }

    function escucharPedidos() {
        db.collection("pedidos")
          .where("estado", "in", ["NUEVO", "EN CAMINO"])
          .onSnapshot(snap => {
            let html = "";
            let container = document.getElementById('listaPedidos');

            snap.forEach(doc => {
                const p = doc.data();
                const idDoc = doc.id;

                if(pedidosRechazados.includes(idDoc)) return;

                // CORRECCIÓN DEFINITIVA ENLACE MAPS
                let linkMaps = p.geolocalizacion ? `<a href="https://www.google.com/maps/dir/?api=1&destination=${p.geolocalizacion.lat},${p.geolocalizacion.lng}&travelmode=driving" target="_blank" class="btn btn-maps">🗺️ VER RUTA EN MAPS</a>` : "";

                if(p.repartidor_id === miId && p.estado === "EN CAMINO") {
                    html += `<div class="pedido-card pedido-activo">
                        <span class="badge" style="background:var(--verde)">ORDEN EN CURSO</span><br><br>
                        <b>Cliente:</b> ${p.cliente}<br>📍 <b>Dir:</b> ${p.ubicacion}<br>
                        <b style="color:var(--naranja); font-size:1.2em;">Monto a cobrar: C$ ${p.total}</b>
                        ${linkMaps} <hr>
                        <button class="btn btn-acc" onclick="finalizarPedido('${idDoc}')">ENTREGA FINALIZADA</button>
                    </div>`;
                }
                else if(p.estado === "NUEVO" && miEstado === "DISPONIBLE") {
                    html += `<div class="pedido-card" id="card-${idDoc}">
                        <div class="timer-tag" id="timer-${idDoc}">1:30</div>
                        <b>👤 ${p.cliente}</b><br>📍 ${p.ubicacion}<br>
                        <b style="color:var(--verde)">Total Pedido: C$ ${p.total}</b><br>
                        ${linkMaps} 
                        <button class="btn btn-acc" onclick="aceptarPedido('${idDoc}')">ACEPTAR PEDIDO</button>
                        <button class="btn btn-rechazar" onclick="rechazarPedido('${idDoc}')">RECHAZAR</button>
                    </div>`;
                    iniciarTemporizador(idDoc);
                }
            });

            container.innerHTML = html || `<p style='text-align:center; color:gray; padding:20px;'>${miEstado === 'OCUPADO' ? 'Termina tu pedido actual para ver más.' : 'Esperando pedidos nuevos...'}</p>`;
        });
    }

    async function aceptarPedido(id) {
        try {
            await db.collection("usuarios").doc(miId).update({ estado_reparto: "OCUPADO" });
            await db.collection("pedidos").doc(id).update({ 
                estado: "EN CAMINO", 
                repartidor_id: miId, 
                repartidorNombre: miNombreUser 
            });
        } catch(e) { console.error(e); }
    }

    async function finalizarPedido(id) {
        if(confirm("¿Confirmas que el pedido fue entregado y pagado?")) {
            await db.collection("pedidos").doc(id).update({ estado: "ENTREGADO" });
            await db.collection("usuarios").doc(miId).update({ estado_reparto: "DISPONIBLE" });
        }
    }

    function rechazarPedido(id) {
        if(!pedidosRechazados.includes(id)) {
            pedidosRechazados.push(id);
            localStorage.setItem("pedidos_rechazados", JSON.stringify(pedidosRechazados));
        }
        escucharPedidos();
    }

    function escucharConfigGlobal() {
        db.collection("configuracion").doc("global").onSnapshot(doc => { 
            if(doc.exists) {
                porcentajeComisionGlobal = doc.data().comision || 15;
                document.getElementById('val-comision').innerText = porcentajeComisionGlobal;
                // Actualizar texto en el registro también
                const labelCom = document.querySelector('.val-comision-text');
                if(labelCom) labelCom.innerText = porcentajeComisionGlobal;
            }
        });
    }

    function escucharMenuParaRepartidor() {
        db.collection("menu").onSnapshot(snap => {
            const contenedor = document.getElementById('listaMenuInterno');
            let menuAgrupado = {};
            snap.forEach(doc => {
                const m = doc.data();
                if(m.disponible) {
                    const dist = m.distribuidor || "General";
                    if(!menuAgrupado[dist]) menuAgrupado[dist] = [];
                    menuAgrupado[dist].push(m);
                }
            });
            let html = "";
            for (const dist in menuAgrupado) {
                html += `<div class="grupo-distribuidor"><div class="titulo-distribuidor">🏪 ${dist}</div>`;
                menuAgrupado[dist].forEach(m => {
                    html += `<div class="menu-rep-item"><span>${m.nombre}</span><b>C$ ${m.precio}</b></div>`;
                });
                html += `</div>`;
            }
            contenedor.innerHTML = html;
        });
    }

    function iniciarTemporizador(id) {
        if (temporizadores[id]) return;
        let tiempo = 90;
        temporizadores[id] = setInterval(() => {
            tiempo--;
            const el = document.getElementById(`timer-${id}`);
            if(el) el.innerText = `0:${tiempo < 10 ? '0' : ''}${tiempo}`;
            if(tiempo <= 0) { clearInterval(temporizadores[id]); rechazarPedido(id); }
        }, 1000);
    }
</script>
</body>
</html>
