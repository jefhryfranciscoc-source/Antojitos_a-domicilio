<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antojitos Pueblo Nuevo - Servicios</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        :root { --naranja: #e67e22; --oscuro: #2c3e50; --blanco: #ffffff; --verde: #2ecc71; --azul: #3498db; --rojo: #e74c3c; --fondo-controles: #f4f5f7; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 15px; }
        .hidden { display: none !important; }
        
        .card { background: white; padding: 10px 20px 25px 20px; border-radius: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 500px; margin: auto; position: relative; }
        
        .horario-tag { display: block; text-align: center; font-size: 0.75em; padding: 5px; border-radius: 10px; margin-bottom: 10px; font-weight: bold; }
        .abierto { background: #e8f5e9; color: #2e7d32; }
        .cerrado { background: #ffebee; color: #c62828; }
        
        h2 { color: var(--naranja); text-align: center; margin-bottom: 5px; }
        
        /* Botones de navegación entre menús */
        .nav-menu { display: flex; gap: 5px; margin-bottom: 15px; }
        .btn-nav { flex: 1; padding: 10px; border-radius: 12px; border: none; font-size: 0.8em; font-weight: bold; cursor: pointer; transition: 0.3s; background: #eee; color: #666; }
        .btn-nav.active { background: var(--azul); color: white; }

        .status-gps { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 12px; margin-bottom: 15px; border-radius: 15px; font-weight: bold; font-size: 0.9em; }
        .gps-buscando { background: #ffeaa7; color: #d35400; border: 1px solid #f1c40f; }
        .gps-error { background: #ff7675; color: white; border: 1px solid #d63031; }
        .gps-listo { background: #d1fad7; color: #27ae60; border: 1px solid #2ecc71; }
        
        .dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; }
        .dot-rojo { background-color: #e74c3c; animation: parpadeo 1s infinite; }
        .dot-verde { background-color: #2ecc71; }
        @keyframes parpadeo { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        .grid-servicios { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .btn-servicio { padding: 15px 10px; border-radius: 15px; font-size: 0.85em; font-weight: bold; cursor: pointer; transition: 0.3s; border: 1px solid #ddd; background: white; }
        .btn-servicio.activo { border: 2px solid var(--azul); transform: scale(1.02); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        .resumen { background: #fff9f2; border: 1.5px dashed var(--naranja); padding: 20px; border-radius: 20px; margin-top: 20px; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; font-family: inherit; }
        
        .area-total { text-align: center; margin-top: 20px; padding: 15px; background: #fff; border-radius: 15px; }
        .btn-pedir { background: var(--naranja); color: white; border: none; width: 100%; padding: 18px; border-radius: 18px; font-size: 1.1em; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-pedir:disabled { background: #ccc; }

        /* Panel Repartidor */
        .repartidor-panel { background: #ebf5ff; border: 2px solid var(--azul); padding: 20px; border-radius: 20px; margin-top: 10px; text-align: center; }
        .status-toggle { padding: 15px; border-radius: 15px; font-weight: bold; border: none; width: 100%; cursor: pointer; margin-bottom: 15px; font-size: 1em; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .lista-colegas { font-size: 0.85em; color: #555; text-align: left; background: white; padding: 12px; border-radius: 15px; margin-top: 15px; border: 1px solid #d0e1f9; }
    </style>
</head>
<body>

<div class="card">
    <div id="statusHorario" class="horario-tag">Cargando...</div>
    
    <div id="menuNavegacion" class="nav-menu hidden">
        <button id="navCliente" class="btn-nav active" onclick="switchView('cliente')">👤 MODO CLIENTE</button>
        <button id="navRepartidor" class="btn-nav" onclick="switchView('repartidor')">🚴 MODO REPARTIDOR</button>
    </div>

    <h2>Antojitos Pueblo Nuevo 🚀</h2>
    
    <div id="vistaPedido">
        <div id="indicadorGPS" class="status-gps gps-buscando">
            <span id="puntoGps" class="dot dot-rojo"></span>
            <span id="textoGps">Buscando señal GPS...</span>
        </div>

        <p style="text-align:center; font-size:0.9em; color:#666; font-weight:bold;">¿Qué servicio necesitas hoy?</p>
        <div class="grid-servicios">
            <button type="button" id="btn-MANDADO" onclick="seleccionarServicio('MANDADO')" class="btn-servicio activo" style="color:#1565c0;">📦 Mandado / Tienda</button>
            <button type="button" id="btn-COMIDA" onclick="seleccionarServicio('COMIDA')" class="btn-servicio" style="color:#e65100;">🍔 Comida Hecha</button>
            <button type="button" id="btn-EMPLEO" onclick="seleccionarServicio('EMPLEO')" class="btn-servicio" style="color:#2e7d32;">🧹 Empleo por 1 Día</button>
            <button type="button" id="btn-OTRO" onclick="seleccionarServicio('OTRO')" class="btn-servicio" style="color:#7b1fa2;">✨ Otro Servicio</button>
        </div>

        <textarea id="detallePedido" placeholder="Ej: Necesito un galón de pintura blanca de la ferretería y 2 libras de azúcar..." rows="4" style="border: 2px solid var(--azul);"></textarea>
        
        <div class="resumen">
            <input type="text" id="nombreCli" placeholder="Tu nombre">
            <input type="tel" id="telCli" placeholder="WhatsApp (ej: 88888888)" oninput="verificarRepartidor(this.value)">
            <textarea id="dirCli" placeholder="Dirección exacta o punto de referencia" rows="2"></textarea>
        </div>

        <div class="area-total">
            <button id="btnPedirFinal" class="btn-pedir" onclick="lanzarPedido()" disabled>⚠️ ACTIVA TU GPS</button>
        </div>
    </div>

    <div id="vistaRepartidor" class="hidden">
        <div class="repartidor-panel">
            <p><strong>Panel de Repartidor</strong></p>
            <button id="btnStatusRepartidor" class="status-toggle" onclick="toggleDisponibilidad()">CARGANDO ESTADO...</button>
            
            <div class="lista-colegas">
                <strong>Colegas en línea:</strong>
                <div id="listaRepartidoresOnline" style="margin-top:8px;">Buscando afiliados...</div>
            </div>
        </div>
        <p style="font-size: 0.7em; color: #999; text-align: center; margin-top: 15px;">Solo tú puedes ver este panel.</p>
    </div>

    <div id="pantallaEstado" class="hidden" style="text-align:center; padding: 40px 10px;">
        <h3>¡Solicitud Enviada! 🚀</h3>
        <p>Se ha notificado a los repartidores activos.</p>
        <button class="btn-pedir" onclick="location.reload()">NUEVA SOLICITUD</button>
    </div>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyAxWMSIqoS1ZXgAO3rOIiOMCrAaAZjDiao", 
        authDomain: "antojitos-pueblo-nuevo.firebaseapp.com", 
        projectId: "antojitos-pueblo-nuevo", 
        storageBucket: "antojitos-pueblo-nuevo.appspot.com", 
        messagingSenderId: "1006413360329", 
        appId: "1:1006413360329:web:99103e89833729cc2e3118" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    
    let servicioSeleccionado = "MANDADO";
    let coordsCliente = null;
    let tiendaAbierta = false;
    let esRepartidor = false;
    let idRepartidor = null;

    window.onload = () => {
        obtenerGPS();
        cargarConfig();
        const savedNom = localStorage.getItem('ant_nom') || "";
        const savedTel = localStorage.getItem('ant_tel') || "";
        document.getElementById('nombreCli').value = savedNom;
        document.getElementById('telCli').value = savedTel;
        
        if(savedTel) verificarRepartidor(savedTel);
    };

    // Función para intercambiar vistas
    function switchView(modo) {
        if(modo === 'repartidor') {
            document.getElementById('vistaPedido').classList.add('hidden');
            document.getElementById('vistaRepartidor').classList.remove('hidden');
            document.getElementById('navRepartidor').classList.add('active');
            document.getElementById('navCliente').classList.remove('active');
            escucharColegas();
        } else {
            document.getElementById('vistaPedido').classList.remove('hidden');
            document.getElementById('vistaRepartidor').classList.add('hidden');
            document.getElementById('navCliente').classList.add('active');
            document.getElementById('navRepartidor').classList.remove('active');
        }
    }

    // Verificar si el número ingresado pertenece a un repartidor afiliado
    async function verificarRepartidor(numero) {
        if(numero.length < 8) return;
        
        try {
            const snap = await db.collection("usuarios")
                .where("telefono", "==", numero)
                .where("rol", "==", "REPARTIDOR")
                .get();
            
            if(!snap.empty) {
                esRepartidor = true;
                idRepartidor = snap.docs[0].id;
                localStorage.setItem('ant_tel', numero);
                
                // Mostrar menú de intercambio
                document.getElementById('menuNavegacion').classList.remove('hidden');
                
                // Sincronizar botón de estado
                actualizarBotonEstado(snap.docs[0].data().disponible);
            } else {
                esRepartidor = false;
                document.getElementById('menuNavegacion').classList.add('hidden');
            }
        } catch (e) { console.error("Error verificando repartidor", e); }
    }

    function seleccionarServicio(tipo) {
        servicioSeleccionado = tipo;
        document.querySelectorAll('.btn-servicio').forEach(btn => btn.classList.remove('activo'));
        document.getElementById('btn-' + tipo).classList.add('activo');

        const ejemplos = {
            'MANDADO': 'Ej: Necesito un galón de pintura blanca de la ferretería y 2 libras de azúcar...',
            'COMIDA': 'Ej: 3 órdenes de tacos con extra chile y una gaseosa de litro...',
            'EMPLEO': 'Ej: Busco a alguien para lavar ropa, limpiar el patio o ayudar con mudanza hoy...',
            'OTRO': 'Describe aquí cualquier otro favor o servicio que necesites que realicemos...'
        };
        document.getElementById('detallePedido').placeholder = ejemplos[tipo];
    }

    function actualizarBotonEstado(disponible) {
        const btn = document.getElementById('btnStatusRepartidor');
        if(disponible) {
            btn.innerText = "🟢 ESTÁS ACTIVO (Recibiendo pedidos)";
            btn.style.background = "#2ecc71";
            btn.style.color = "white";
        } else {
            btn.innerText = "🔴 ESTÁS INACTIVO (No disponible)";
            btn.style.background = "#e74c3c";
            btn.style.color = "white";
        }
    }

    async function toggleDisponibilidad() {
        if(!idRepartidor) return;
        const docRef = db.collection("usuarios").doc(idRepartidor);
        const doc = await docRef.get();
        const nuevoEstado = !doc.data().disponible;
        await docRef.update({ disponible: nuevoEstado });
        actualizarBotonEstado(nuevoEstado);
    }

    function escucharColegas() {
        db.collection("usuarios").where("rol", "==", "REPARTIDOR").onSnapshot(snap => {
            let html = "";
            snap.forEach(doc => {
                const d = doc.data();
                const statusIcon = d.disponible ? "🟢" : "⚪";
                html += `<div style="margin-bottom:5px;">${statusIcon} ${d.nombre || 'Compañero'}</div>`;
            });
            document.getElementById('listaRepartidoresOnline').innerHTML = html || "No hay otros afiliados registrados.";
        });
    }

    function cargarConfig() { 
        db.collection("configuracion").doc("global").onSnapshot(doc => { 
            if(doc.exists) {
                tiendaAbierta = doc.data().abierto;
                document.getElementById('statusHorario').innerText = tiendaAbierta ? "🟢 SERVICIO DISPONIBLE" : "🔴 CERRADO";
                document.getElementById('statusHorario').className = "horario-tag " + (tiendaAbierta ? "abierto" : "cerrado");
            }
        }); 
    }

    function obtenerGPS() {
        if (!navigator.geolocation) return;
        navigator.geolocation.watchPosition((pos) => {
            coordsCliente = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            document.getElementById('indicadorGPS').className = "status-gps gps-listo";
            document.getElementById('textoGps').innerText = "📍 UBICACIÓN LISTA";
            document.getElementById('puntoGps').className = "dot dot-verde";
            if(tiendaAbierta) {
                document.getElementById('btnPedirFinal').disabled = false;
                document.getElementById('btnPedirFinal').innerText = "🚀 ENVIAR SOLICITUD";
            }
        }, (err) => {
            document.getElementById('indicadorGPS').className = "status-gps gps-error";
            document.getElementById('textoGps').innerText = "⚠️ GPS DESACTIVADO";
            setTimeout(obtenerGPS, 3000);
        }, { enableHighAccuracy: true });
    }

    async function lanzarPedido() {
        const nom = document.getElementById('nombreCli').value;
        const tel = document.getElementById('telCli').value;
        const dir = document.getElementById('dirCli').value;
        const desc = document.getElementById('detallePedido').value;
        if(!nom || !tel || !dir || !desc) return alert("Completa todos los campos.");
        
        localStorage.setItem('ant_nom', nom);
        localStorage.setItem('ant_tel', tel);

        try {
            await db.collection("pedidos").add({
                cliente: nom, telefono: tel, ubicacion: dir, detalle: desc,
                tipo: servicioSeleccionado, estado: "NUEVO",
                timestamp: firebase.firestore.FieldValue.serverTimestamp(), coords: coordsCliente
            });
            document.getElementById('vistaPedido').classList.add('hidden');
            document.getElementById('pantallaEstado').classList.remove('hidden');
        } catch(e) { alert("Error al conectar con la base de datos."); }
    }
</script>
</body>
</html>
