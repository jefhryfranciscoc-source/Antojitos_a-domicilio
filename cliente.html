<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antojitos Pueblo Nuevo - Pedir</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        :root { --naranja: #e67e22; --oscuro: #2c3e50; --blanco: #ffffff; --verde: #2ecc71; --azul: #3498db; --rojo: #e74c3c; --gris: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 15px; }
        .hidden { display: none !important; }
        
        #modalPermisos { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 25px; text-align: center; max-width: 320px; width: 90%; }
        .card { background: white; padding: 10px 20px 25px 20px; border-radius: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        
        .horario-tag { display: block; text-align: center; font-size: 0.75em; padding: 5px; border-radius: 10px; margin-bottom: 10px; font-weight: bold; }
        .abierto { background: #e8f5e9; color: #2e7d32; }
        .cerrado { background: #ffebee; color: #c62828; }

        h2 { color: var(--naranja); text-align: center; margin-bottom: 5px; }
        
        .item-comida { display: flex; align-items: center; padding: 15px 5px; border-bottom: 1px solid #f0f0f0; gap: 12px; }
        .info { flex: 1; }
        .info b { display: block; color: var(--oscuro); text-transform: uppercase; font-size: 0.9em; }
        .info span { color: var(--verde); font-weight: bold; }
        
        .controles { display: flex; align-items: center; gap: 10px; }
        .btn-mas { background: white; color: var(--naranja); border: 2px solid var(--naranja); width: 35px; height: 35px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        .resumen { background: #fff9f2; border: 1.5px dashed var(--naranja); padding: 20px; border-radius: 20px; margin-top: 20px; }
        .resumen input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        
        .linea-detalle { display: flex; justify-content: space-between; font-size: 0.9em; margin-bottom: 5px; }
        .total-final { display: flex; justify-content: space-between; font-size: 1.1em; color: var(--naranja); font-weight: bold; margin-top: 10px; border-top: 1px solid #eee; padding-top: 10px; }

        .btn-pedir { background: var(--naranja); color: white; border: none; width: 100%; padding: 18px; border-radius: 18px; font-size: 1.1em; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .btn-pedir:disabled { background: #ccc; cursor: not-allowed; }

        #pantallaEstado { text-align: center; padding: 30px 10px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--naranja); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .status-badge { display: inline-block; padding: 10px 25px; border-radius: 25px; font-weight: bold; margin-top: 15px; color: white; text-transform: uppercase; }
        .status-NUEVO { background: var(--azul); }
        .status-EN\ CAMINO { background: var(--naranja); }
        .status-ENTREGADO { background: var(--verde); }
        .status-RECHAZADO { background: var(--rojo); }
    </style>
</head>
<body>

<div id="modalPermisos" class="hidden">
    <div class="modal-content">
        <h3>📍 Ubicación Necesaria</h3>
        <p>Necesitamos tu GPS para calcular la distancia al local y el costo de envío.</p>
        <button class="btn-pedir" onclick="activarTodo()">ACTIVAR GPS</button>
    </div>
</div>

<div class="card">
    <div id="statusHorario" class="horario-tag">Cargando horario...</div>
    <h2>Antojitos Pueblo Nuevo 🍔</h2>
    
    <div id="vistaPedido">
        <div id="contenedorMenu">Cargando menú...</div>
        
        <div class="resumen">
            <input type="text" id="nombreCli" placeholder="Tu nombre">
            <input type="text" id="dirCli" placeholder="Dirección exacta o referencia">
            
            <div class="linea-detalle">
                <span>Subtotal:</span> <b id="subTotal">C$ 0</b>
            </div>
            <div class="linea-detalle">
                <span>Envío (Km):</span> <b id="envioMonto">C$ 0</b>
            </div>
            <div class="linea-detalle">
                <small id="txtDistancia" style="color:gray;">Distancia: 0 km</small>
            </div>
            
            <div class="total-final">
                <span>TOTAL:</span> <b id="granTotal">C$ 0</b>
            </div>
        </div>
        <button id="btnPedirFinal" class="btn-pedir" onclick="lanzarPedido()">🚀 ENVIAR PEDIDO</button>
    </div>

    <div id="pantallaEstado" class="hidden">
        <div id="animacionEstado" class="loader"></div>
        <h3 id="msgEstado">Buscando Repartidor...</h3>
        <p id="detalleEstado">Tu pedido ha sido enviado.</p>
        <div id="badgeEstado" class="status-badge status-NUEVO">ESPERANDO</div>
        <br><br>
        <div id="contenedorReintentar" class="hidden">
            <button class="btn-pedir" onclick="reintentarPedido()">🔄 REINTENTAR AHORA</button>
        </div>
        <button class="btn-pedir" style="background:var(--oscuro); font-size:0.8em; padding:10px;" onclick="location.reload()">VOLVER AL MENÚ</button>
    </div>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyAxWMSIqoS1ZXgAO3rOIiOMCrAaAZjDiao", 
        authDomain: "antojitos-pueblo-nuevo.firebaseapp.com", 
        projectId: "antojitos-pueblo-nuevo", 
        storageBucket: "antojitos-pueblo-nuevo.appspot.com", 
        messagingSenderId: "1006413360329", 
        appId: "1:1006413360329:web:99103e89833729cc2e3118" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    
    let carrito = {}; 
    let configLogistica = { base: 15, km_precio: 15, abierto: false };
    let distanciaMaximaActual = 0;

    window.onload = () => {
        document.getElementById('nombreCli').value = localStorage.getItem('antojitos_nombre') || "";
        document.getElementById('dirCli').value = localStorage.getItem('antojitos_dir') || "";
        
        if(localStorage.getItem('ultimo_pedido_id')) { verificarEstadoPedido(localStorage.getItem('ultimo_pedido_id')); }
        if (localStorage.getItem('antojitos_permisos_listos') !== 'true') {
            document.getElementById('modalPermisos').classList.remove('hidden');
        }
        cargarConfigGlobal();
    };

    function cargarConfigGlobal() { 
        db.collection("configuracion").doc("global").onSnapshot(doc => { 
            if(doc.exists) {
                const d = doc.data();
                configLogistica.base = d.precio_minimo || 15;
                configLogistica.km_precio = d.precio_km || 15;
                configLogistica.abierto = d.abierto || false;
                
                const h = document.getElementById('statusHorario');
                h.innerText = d.abierto ? `🟢 ABIERTO AHORA` : `🔴 CERRADO`;
                h.className = `horario-tag ${d.abierto ? 'abierto' : 'cerrado'}`;
                document.getElementById('btnPedirFinal').disabled = !d.abierto;
                actualizarPreciosVisibles();
            }
        }); 
    }

    function calcularDistancia(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
    }

    db.collection("menu").onSnapshot(snap => {
        let html = "";
        snap.forEach(doc => {
            const m = doc.data(); 
            if(!m.disponible) return;
            const q = carrito[doc.id] ? carrito[doc.id].qty : 0;
            html += `<div class="item-comida">
                <div class="info">
                    <b>${m.nombre}</b>
                    <small style="color: gray; display: block;">📍 ${m.distribuidor || 'Antojitos'}</small>
                    <span>C$ ${m.precio}</span>
                </div>
                <div class="controles">
                    <button class="btn-mas" onclick="modificar('${doc.id}',-1,${m.precio},'${m.nombre}',${m.latitud},${m.longitud})">-</button>
                    <b id="q-${doc.id}">${q}</b>
                    <button class="btn-mas" onclick="modificar('${doc.id}',1,${m.precio},'${m.nombre}',${m.latitud},${m.longitud})">+</button>
                </div>
            </div>`;
        });
        document.getElementById('contenedorMenu').innerHTML = html;
    });

    function modificar(id, cantidad, precio, nombre, lat, lng) {
        if(!carrito[id]) carrito[id] = {qty:0, precio:precio, nombre:nombre, lat:lat, lng:lng};
        carrito[id].qty += cantidad; 
        if(carrito[id].qty < 0) carrito[id].qty = 0;
        document.getElementById('q-'+id).innerText = carrito[id].qty;
        actualizarPreciosVisibles();
    }

    function actualizarPreciosVisibles() {
        let subtotal = 0;
        let maxDist = 0;

        navigator.geolocation.getCurrentPosition(pos => {
            const uLat = pos.coords.latitude;
            const uLng = pos.coords.longitude;

            for(let k in carrito) {
                if(carrito[k].qty > 0) {
                    subtotal += (carrito[k].qty * carrito[k].precio);
                    const d = calcularDistancia(uLat, uLng, carrito[k].lat, carrito[k].lng);
                    if(d > maxDist) maxDist = d;
                }
            }

            distanciaMaximaActual = maxDist;
            let costoEnvio = subtotal > 0 ? configLogistica.base + (distanciaMaximaActual * configLogistica.km_precio) : 0;

            document.getElementById('subTotal').innerText = "C$ " + subtotal;
            document.getElementById('envioMonto').innerText = "C$ " + Math.round(costoEnvio);
            document.getElementById('txtDistancia').innerText = `Distancia: ${distanciaMaximaActual.toFixed(2)} km`;
            document.getElementById('granTotal').innerText = "C$ " + Math.round(subtotal + costoEnvio);
        }, () => {});
    }

    async function lanzarPedido() {
        const nom = document.getElementById('nombreCli').value.trim(); 
        const dir = document.getElementById('dirCli').value.trim();
        let lista = []; let sub = 0;
        
        for(let k in carrito) { 
            if(
