<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo - Antojitos Pueblo Nuevo</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        :root { 
            --naranja: #e67e22; 
            --naranja-claro: #fdf2e9; 
            --oscuro: #1a252f; 
            --texto-suave: #7f8c8d; 
            --verde: #2ecc71; 
            --fondo-desc: #f8f9fa;
            --gris-elegante: #fcfcfc;
            --gris-borde: #e0e0e0;
        }
        
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #fdfdfd; margin: 0; padding: 10px; padding-bottom: 120px; color: var(--oscuro); overflow-x: hidden; }
        
        header { text-align: center; padding: 20px 10px 10px 10px; }
        header h2 { font-size: 2em; font-weight: 900; letter-spacing: -1px; margin-bottom: 2px; }
        
        #mensajeBienvenida { font-size: 1em; color: #d35400; background: var(--naranja-claro); font-weight: 700; margin: 10px auto 5px auto; display: inline-block; padding: 8px 15px; line-height: 1.3; border-radius: 10px; border: 1px solid rgba(230, 126, 34, 0.3); }

        .tabs-wrapper { position: sticky; top: 0; background: rgba(253, 253, 253, 0.95); backdrop-filter: blur(10px); z-index: 100; margin: 0 -10px; padding: 12px 0; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .tabs-container { display: flex; gap: 10px; overflow-x: auto; padding: 0 20px; scrollbar-width: none; }
        .tabs-container::-webkit-scrollbar { display: none; }
        
        .tab-btn { padding: 10px 20px; border-radius: 25px; border: 1.5px solid #eee; background: #fff; color: #555; font-weight: 700; cursor: pointer; transition: 0.3s; font-size: 0.9em; flex-shrink: 0; }
        .tab-btn.active { background: var(--naranja); color: white; border-color: var(--naranja); box-shadow: 0 4px 12px rgba(230, 126, 34, 0.3); }

        .local-card { 
            background: linear-gradient(145deg, #ffffff, var(--gris-elegante)); 
            border-radius: 20px; 
            margin-bottom: 20px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.03); 
            border: 1px solid var(--gris-borde); 
            border-left: 6px solid var(--naranja); 
            overflow: hidden; 
            transition: transform 0.2s ease;
        }

        .local-header { 
            padding: 22px 20px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            cursor: pointer; 
            background: rgba(255, 255, 255, 0.4);
        }
        
        .local-nombre { font-weight: 800; color: var(--oscuro); font-size: 1.25em; letter-spacing: -0.5px; }
        
        .local-card.open { border-color: var(--naranja); box-shadow: 0 10px 25px rgba(0,0,0,0.06); }
        .local-card.open .local-header { border-bottom: 1px solid #f0f0f0; background: #fff; }

        .productos-lista { display: none; padding: 15px; background: #fff; }
        .local-card.open .productos-lista { display: block; }

        .producto-item { display: flex; flex-direction: column; padding: 16px; margin-bottom: 12px; background: #fff; border-radius: 18px; border: 1px solid #eee; box-shadow: 0 3px 6px rgba(0,0,0,0.03); }
        .prod-superior { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; gap: 10px; }
        .prod-info-base b { color: #000; font-size: 1.25em; display: block; font-weight: 800; }
        .prod-precio { background: var(--naranja); color: #fff; font-weight: 900; font-size: 1.1em; padding: 8px 14px; border-radius: 12px; box-shadow: 0 4px 10px rgba(230, 126, 34, 0.25); white-space: nowrap; }

        .prod-cuerpo { display: flex; gap: 12px; align-items: flex-start; }
        .prod-desc { flex: 1; font-size: 0.95em; color: #555; background: var(--fondo-desc); padding: 10px 12px; border-radius: 12px; border-left: 3px solid #ddd; white-space: pre-wrap; margin-bottom: 5px; }
        
        .prod-foto-mini { width: 80px; height: 80px; border-radius: 12px; object-fit: cover; border: 1px solid #eee; flex-shrink: 0; }

        .variantes-titulo { font-size: 0.65em; text-transform: uppercase; color: #d35400; font-weight: 800; margin: 10px 0 6px 5px; letter-spacing: 1px; }
        .contenedor-chips { display: flex; flex-wrap: wrap; gap: 8px; }
        .chip { background: #fffafa; border: 1.5px solid #edbb99; border-radius: 10px; padding: 6px 12px; font-size: 0.85em; color: #5d4037; font-weight: 700; box-shadow: 0 2px 4px rgba(237, 187, 153, 0.1); }

        .msg-cargando { text-align: center; padding: 20px; color: var(--texto-suave); font-style: italic; }
        .btn-hacer-pedido { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 400px; background: var(--verde); color: white; text-align: center; padding: 18px; border-radius: 18px; font-weight: 900; text-decoration: none; font-size: 1.2em; z-index: 90; box-shadow: 0 8px 20px rgba(46, 204, 113, 0.3); }
    </style>
</head>
<body>

<header>
    <h2 style="color: var(--naranja);">Antojitos Pueblo Nuevo 🏪</h2>
    <span id="mensajeBienvenida">Cargando...</span>
    <span id="textoSugerencia" style="font-size: 0.9em; color: var(--texto-suave); display: block; font-style: italic; margin-top: 5px;"></span>
</header>

<div class="tabs-wrapper">
    <div id="tabsCategorias" class="tabs-container"></div>
</div>

<div id="listaLocales" style="max-width: 600px; margin: auto; margin-top: 20px;"></div>

<a href="#" id="btnIrAPedidos" class="btn-hacer-pedido">🛒 HACER PEDIDO</a>

<script>
    const config = { 
        apiKey: "AIzaSyAxWMSIqoS1ZXgAO3rOIiOMCrAaAZjDiao", 
        authDomain: "antojitos-pueblo-nuevo.firebaseapp.com", 
        projectId: "antojitos-pueblo-nuevo", 
        storageBucket: "antojitos-pueblo-nuevo.appspot.com", 
        messagingSenderId: "1006413360329", 
        appId: "1:1006413360329:web:99103e89833729cc2e3118" 
    };
    firebase.initializeApp(config);
    const db = firebase.firestore();
    let catAct = "todo";

    window.onload = () => { cargarConfig(); cargarCats(); cargarLocales(); };

    function cargarConfig() {
        db.collection("configuracion").doc("catalogo").onSnapshot(doc => {
            if(doc.exists) {
                const d = doc.data();
                document.getElementById('btnIrAPedidos').href = d.linkPedido || "#";
                document.getElementById('mensajeBienvenida').innerText = d.mensajeCabecera || "¡Bienvenidos!";
                document.getElementById('textoSugerencia').innerText = d.textoSugerencia || "";
            }
        });
    }

    function cargarCats() {
        db.collection("categorias").orderBy("nombre").onSnapshot(snap => {
            const c = document.getElementById('tabsCategorias');
            c.innerHTML = `<button class="tab-btn ${catAct=='todo'?'active':''}" onclick="selTab('todo',this)">✨ Todo</button>`;
            snap.forEach(d => {
                c.innerHTML += `<button class="tab-btn ${catAct==d.id?'active':''}" onclick="selTab('${d.id}',this)">${d.data().nombre}</button>`;
            });
        });
    }

    function selTab(id, b) {
        catAct = id;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        b.classList.add('active');
        cargarLocales();
    }

    function cargarLocales() {
        let q = db.collection("locales");
        if(catAct !== "todo") q = q.where("categoriaId", "==", catAct);
        q.onSnapshot(snap => {
            const container = document.getElementById('listaLocales');
            container.innerHTML = "";
            snap.forEach(doc => {
                const l = doc.data();
                container.innerHTML += `
                <div class="local-card" id="card-${doc.id}">
                    <div class="local-header" onclick="toggleAcc('${doc.id}')">
                        <span class="local-nombre">${l.emoji || '🏘️'} ${l.nombre}</span>
                        <span style="color:var(--naranja); font-weight:bold; font-size: 0.8em;">DESCUBRIR ▼</span>
                    </div>
                    <div id="prod-${doc.id}" class="productos-lista"></div>
                </div>`;
            });
        });
    }

    function toggleAcc(id) {
        const c = document.getElementById(`card-${id}`);
        const box = document.getElementById(`prod-${id}`);
        const abierto = c.classList.contains('open');
        document.querySelectorAll('.local-card').forEach(card => card.classList.remove('open'));
        if(!abierto) { 
            c.classList.add('open'); 
            box.innerHTML = `<div class="msg-cargando">⏳ Cargando menú, espere un segundo...</div>`;
            cargarProds(id); 
        }
    }

    function cargarProds(lId) {
        const box = document.getElementById(`prod-${lId}`);
        db.collection("productos").where("localId", "==", lId).onSnapshot(snap => {
            box.innerHTML = "";
            if (snap.empty) { box.innerHTML = `<div class="msg-cargando">No hay productos disponibles.</div>`; return; }
            snap.forEach(doc => {
                const p = doc.data();
                let chips = "";
                if(p.variantes){
                    chips = '<div class="variantes-titulo">Marcas/Opciones:</div><div class="contenedor-chips">';
                    p.variantes.split("-").forEach(v => { if(v.trim()) chips += `<div class="chip">${v.trim()}</div>`; });
                    chips += '</div>';
                }

                box.innerHTML += `
                <div class="producto-item">
                    <div class="prod-superior">
                        <div class="prod-info-base"><b>${p.nombre}</b></div>
                        <div class="prod-precio">${p.precio}</div>
                    </div>
                    
                    <div class="prod-cuerpo">
                        <div style="flex:1">
                            ${p.descripcion ? `<div class="prod-desc">${p.descripcion}</div>` : ''}
                            ${chips}
                        </div>
                        ${p.urlImagen ? `<img src="${p.urlImagen}" class="prod-foto-mini" alt="${p.nombre}">` : ''}
                    </div>
                </div>`;
            });
        });
    }
</script>
</body>
</html>
