<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin - Antojitos PN</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        :root { --naranja: #e67e22; --verde: #2ecc71; --rojo: #e74c3c; --oscuro: #2c3e50; --azul: #3498db; --gris: #f5f6f7; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gris); margin: 0; padding: 0; }
        .header { background: var(--oscuro); color: white; padding: 15px; text-align: center; }
        
        .tabs { display: flex; gap: 5px; padding: 10px; background: white; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); overflow-x: auto; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; white-space: nowrap; font-size: 0.85em; }
        .tab-btn.active { background: var(--naranja); color: white; }
        
        .tab-content { display: none; padding: 15px; }
        .tab-content.active { display: block; }
        
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .pedido-card { border-left: 6px solid #ccc; }
        .pedido-card.NUEVO { border-left-color: var(--azul); }
        .pedido-card.EN\ CAMINO { border-left-color: var(--naranja); }
        .pedido-card.ENTREGADO { border-left-color: var(--verde); }

        .btn-acc { background: var(--verde); color: white; border: none; padding: 8px; border-radius: 6px; cursor: pointer; }
        .btn-borrar { background: var(--rojo); color: white; border: none; padding: 8px; border-radius: 6px; cursor: pointer; }
        
        .ajuste-section { background: white; border-radius: 12px; padding: 18px; margin-bottom: 15px; border: 1px solid #eee; }
        .ajuste-section h3 { margin-top: 0; font-size: 1em; color: var(--oscuro); border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .input-group { display: flex; align-items: center; margin-bottom: 12px; gap: 10px; }
        .input-group label { flex: 1; font-size: 0.9em; font-weight: 600; }
        .input-group input { flex: 1.6; padding: 10px; border: 1px solid #ddd; border-radius: 8px; text-align: center; }
        
        .toggle-switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--verde); }
        input:checked + .slider:before { transform: translateX(24px); }

        .btn-save { background: var(--oscuro); color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="header"><h3>MASTER CONTROL PN 👑</h3></div>

<div class="tabs">
    <button class="tab-btn active" onclick="openTab(event, 'pedidos')">ORDENES</button>
    <button class="tab-btn" onclick="openTab(event, 'menu')">MENÚ</button>
    <button class="tab-btn" onclick="openTab(event, 'repartidores')">EQUIPO</button>
    <button class="tab-btn" onclick="openTab(event, 'ajustes')">AJUSTES</button>
</div>

<div id="pedidos" class="tab-content active">
    <div style="display:flex; gap:10px; margin-bottom:15px;">
        <button onclick="limpiarEntregados()" style="flex:1; padding:10px; background:var(--gris); border-radius:8px; border:1px solid #ddd;">Limpiar Entregados</button>
    </div>
    <div id="listaPedidos">Cargando pedidos...</div>
</div>

<div id="menu" class="tab-content">
    <button onclick="gestionarPlato()" style="background:var(--naranja); color:white; border:none; padding:15px; border-radius:10px; width:100%; font-weight:bold; margin-bottom:15px;">+ NUEVO PRODUCTO</button>
    <div id="gridMenu"></div>
</div>

<div id="repartidores" class="tab-content">
    <h4>Postulantes y Activos</h4>
    <div id="listaRepartidores">Cargando personal...</div>
</div>

<div id="ajustes" class="tab-content">
    <div class="ajuste-section">
        <h3>🏪 Operación</h3>
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span>Estado del Local: <b id="estadoTexto">...</b></span>
            <label class="toggle-switch">
                <input type="checkbox" id="toggleAbierto" onchange="guardarAjustesRapido()">
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <div class="ajuste-section">
        <h3>💰 Finanzas y Logística</h3>
        <div class="input-group">
            <label>Mi Comisión (%)</label>
            <input type="number" id="confComision" placeholder="6">
        </div>
        <div class="input-group">
            <label>Envío Base (C$)</label>
            <input type="number" id="confMinimo" placeholder="15">
        </div>
        <div class="input-group">
            <label>Precio por Km (C$)</label>
            <input type="number" id="confPrecioKm" placeholder="15">
        </div>
        <small style="color:gray;">* El envío se calcula: Base + (Distancia * Precio por Km).</small>
    </div>

    <button onclick="guardarAjustesRapido()" class="btn-save">GUARDAR TODO</button>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyAxWMSIqoS1ZXgAO3rOIiOMCrAaAZjDiao", 
        authDomain: "antojitos-pueblo-nuevo.firebaseapp.com", 
        projectId: "antojitos-pueblo-nuevo", 
        storageBucket: "antojitos-pueblo-nuevo.appspot.com", 
        messagingSenderId: "1006413360329", 
        appId: "1:1006413360329:web:99103e89833729cc2e3118" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    window.onload = () => { escucharPedidos(); escucharMenu(); escucharRepartidores(); cargarConfig(); };

    function cargarConfig() {
        db.collection("configuracion").doc("global").onSnapshot(doc => {
            if(doc.exists) {
                const d = doc.data();
                document.getElementById('confComision').value = d.comision || 6;
                document.getElementById('confMinimo').value = d.precio_minimo || 15;
                document.getElementById('confPrecioKm').value = d.precio_km || 15;
                document.getElementById('toggleAbierto').checked = d.abierto || false;
                document.getElementById('estadoTexto').innerText = d.abierto ? "ABIERTO" : "CERRADO";
                document.getElementById('estadoTexto').style.color = d.abierto ? "green" : "red";
            }
        });
    }

    async function guardarAjustesRapido() {
        await db.collection("configuracion").doc("global").set({
            comision: parseFloat(document.getElementById('confComision').value),
            precio_minimo: parseFloat(document.getElementById('confMinimo').value),
            precio_km: parseFloat(document.getElementById('confPrecioKm').value),
            abierto: document.getElementById('toggleAbierto').checked
        }, { merge: true });
        alert("Configuración actualizada correctamente.");
    }

    function escucharPedidos() {
        db.collection("pedidos").orderBy("timestamp", "desc").limit(20).onSnapshot(snap => {
            const cont = document.getElementById('listaPedidos');
            cont.innerHTML = "";
            snap.forEach(doc => {
                const p = doc.data();
                cont.innerHTML += `
                    <div class="card pedido-card ${p.estado}">
                        <div style="display:flex; justify-content:space-between;">
                            <b>👤 ${p.cliente}</b>
                            <span style="color:var(--verde); font-weight:bold;">C$ ${p.total}</span>
                        </div>
                        <div style="font-size:0.85em; margin:5px 0;">${p.pedido.join(", ")}</div>
                        <div style="font-size:0.8em; color:gray;">📍 ${p.ubicacion}</div>
                        <div style="font-size:0.8em; color:var(--azul);">📏 Distancia: ${p.distancia_km || '0'} km</div>
                        <div style="font-size:0.8em; margin-top:5px;">🛵 Repartidor: <b>${p.repartidorNombre || 'Pendiente'}</b></div>
                        <div style="margin-top:10px; display:flex; gap:10px;">
                            <button class="btn-borrar" onclick="eliminarPedido('${doc.id}')">Eliminar</button>
                        </div>
                    </div>`;
            });
        });
    }

    function escucharMenu() {
        db.collection("menu").onSnapshot(snap => {
            const grid = document.getElementById('gridMenu');
            grid.innerHTML = "";
            snap.forEach(doc => {
                const m = doc.data();
                grid.innerHTML += `
                    <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                        <div>
                            <b style="text-transform:uppercase;">${m.nombre}</b><br>
                            <small>C$ ${m.precio} | ${m.distribuidor}</small><br>
                            <small style="color:gray; font-size:0.75em;">📍 GPS: ${m.latitud}, ${m.longitud}</small>
                        </div>
                        <div>
                            <button onclick="gestionarPlato('${doc.id}','${m.nombre}',${m.precio},'${m.distribuidor}',${m.latitud},${m.longitud})">📝</button>
                            <button onclick="eliminarPlato('${doc.id}')">🗑️</button>
                        </div>
                    </div>`;
            });
        });
    }

    function escucharRepartidores() {
        db.collection("usuarios").where("rol", "in", ["POSTULANTE", "REPARTIDOR"]).onSnapshot(snap => {
            const cont = document.getElementById('listaRepartidores');
            cont.innerHTML = "";
            snap.forEach(doc => {
                const u = doc.data();
                const esRep = u.rol === "REPARTIDOR";
                cont.innerHTML += `
                    <div class="card" style="display:flex; justify-content:space-between; align-items:center; border-left: 4px solid ${esRep ? 'var(--verde)' : 'var(--azul)'}">
                        <div>
                            <b>${u.nombre}</b> (@${u.usuario})<br>
                            <small>📞 ${u.telefono}</small>
                        </div>
                        <div>
                            ${!esRep ? `<button class="btn-acc" onclick="aprobarRepartidor('${doc.id}')">APROBAR</button>` : `<span style="color:green; font-weight:bold;">ACTIVO</span>`}
                            <button class="btn-borrar" style="padding:5px 10px;" onclick="eliminarUsuario('${doc.id}')">X</button>
                        </div>
                    </div>`;
            });
        });
    }

    // FUNCIÓN ACTUALIZADA CON COORDENADAS POR PLATILLO
    async function gestionarPlato(id=null, n='', p='', d='Antojitos', lat='', lng='') {
        const nom = prompt("Nombre del producto:", n);
        const pre = prompt("Precio (C$):", p);
        const dis = prompt("Local que lo vende:", d);
        const latLocal = prompt("Latitud de Google Maps del Local:", lat || "13.486");
        const lngLocal = prompt("Longitud de Google Maps del Local:", lng || "-86.481");

        if(nom && pre && latLocal && lngLocal) {
            const data = { 
                nombre: nom.toLowerCase(), 
                precio: parseFloat(pre), 
                distribuidor: dis,
                latitud: parseFloat(latLocal), 
                longitud: parseFloat(lngLocal),
                disponible: true 
            };
            if(id) await db.collection("menu").doc(id).update(data);
            else await db.collection("menu").add(data);
            alert("¡Platillo guardado correctamente!");
        }
    }

    async function aprobarRepartidor(id) {
        if(confirm("¿Aprobar este repartidor para que empiece a trabajar?")) {
            await db.collection("usuarios").doc(id).update({ rol: "REPARTIDOR" });
        }
    }

    async function eliminarPedido(id) { if(confirm("¿Borrar orden?")) await db.collection("pedidos").doc(id).delete(); }
    async function eliminarPlato(id) { if(confirm("¿Borrar del menú?")) await db.collection("menu").doc(id).delete(); }
    async function eliminarUsuario(id) { if(confirm("¿Eliminar este usuario?")) await db.collection("usuarios").doc(id).delete(); }

    async function limpiarEntregados() {
        if(confirm("Se borrarán todas las órdenes marcadas como ENTREGADO. ¿Continuar?")) {
            const snap = await db.collection("pedidos").where("estado","==","ENTREGADO").get();
            snap.forEach(doc => doc.ref.delete());
        }
    }

    function openTab(evt, id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        evt.currentTarget.classList.add('active');
    }
</script>
</body>
</html>
