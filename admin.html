<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASTER CONTROL PN</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        :root { --naranja: #e67e22; --verde: #2ecc71; --rojo: #e74c3c; --oscuro: #2c3e50; --azul: #3498db; --gris: #f5f6f7; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--gris); margin: 0; padding: 0; }
        
        /* Título con cursor interactivo para el truco secreto */
        .header { background: var(--oscuro); color: white; padding: 15px; text-align: center; cursor: pointer; user-select: none; }
        
        .tabs { display: flex; gap: 5px; padding: 10px; background: white; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); overflow-x: auto; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; white-space: nowrap; font-size: 0.85em; }
        .tab-btn.active { background: var(--naranja); color: white; }
        
        .tab-content { display: none; padding: 15px; }
        .tab-content.active { display: block; }
        
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .pedido-card { border-left: 6px solid var(--azul); position: relative; }
        .fecha-orden { font-size: 0.75em; color: #7f8c8d; display: block; margin-bottom: 8px; font-weight: bold; }

        .btn-acc { background: var(--verde); color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.8em; }
        .btn-borrar { background: var(--rojo); color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8em; font-weight: bold; }
        .btn-edit { background: var(--azul); color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8em; font-weight: bold;}
        .btn-peligro-total { background: #c0392b; color: white; width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 15px; }
        
        .input-group { display: flex; flex-direction: column; margin-bottom: 15px; }
        .input-group label { font-size: 0.9em; font-weight: bold; margin-bottom: 5px; color: var(--oscuro); }
        .input-group input, .input-group textarea { padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; }
        
        /* --- BOTÓN DE SALTO (VISIBLE) --- */
        .btn-salto-admin {
            position: fixed; bottom: 20px; right: 20px;
            background: var(--naranja); color: white; padding: 12px 20px;
            border-radius: 50px; text-decoration: none; font-weight: bold;
            display: flex; align-items: center; gap: 8px; font-size: 13px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 999;
            transition: 0.3s; border: 2px solid rgba(255,255,255,0.1);
        }
        .btn-salto-admin:active { transform: scale(0.9); }

        /* --- MODAL CONFIGURACIÓN OCULTA --- */
        #modalConfigSecreta {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%); background: white;
            padding: 30px; border-radius: 20px; z-index: 10001;
            width: 90%; max-width: 350px; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .overlay-secreto {
            display: none; position: fixed; top: 0; left: 0; width: 100%;
            height: 100%; background: rgba(0,0,0,0.6); z-index: 10000;
            backdrop-filter: blur(4px);
        }

        .toggle-switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 20px; width: 20px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--verde); }
        input:checked + .slider:before { transform: translateX(24px); }

        .btn-save { background: var(--oscuro); color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="header" onclick="detectarClicksSecretos()"><h3>MASTER CONTROL 👑</h3></div>

<div class="tabs">
    <button class="tab-btn active" onclick="openTab(event, 'pedidos')">ORDENES</button>
    <button class="tab-btn" onclick="openTab(event, 'repartidores')">EQUIPO</button>
    <button class="tab-btn" onclick="openTab(event, 'ajustes')">AJUSTES</button>
</div>

<div id="pedidos" class="tab-content active">
    <button class="btn-peligro-total" onclick="eliminarTodoElHistorial()">⚠️ BORRAR TODO EL HISTORIAL ⚠️</button>
    <div id="listaPedidos">Cargando pedidos...</div>
</div>

<div id="repartidores" class="tab-content">
    <button onclick="agregarRepartidor()" style="background:var(--naranja); color:white; padding:15px; border-radius:10px; width:100%; font-weight:bold; margin-bottom:15px; border:none; cursor:pointer;">+ NUEVO REPARTIDOR</button>
    <h4 style="color: var(--oscuro); margin-top: 5px;">Equipo Autorizado</h4>
    <div id="listaRepartidores">Cargando personal...</div>
</div>

<div id="ajustes" class="tab-content">
    <div class="card">
        <h3 style="color: var(--naranja); margin-top: 0;">🏪 Operación del Sistema</h3>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 15px;">
            <span>Estado Web: <b id="estadoTexto">...</b></span>
            <label class="toggle-switch">
                <input type="checkbox" id="toggleAbierto" onchange="guardarAjustesRapido()">
                <span class="slider"></span>
            </label>
        </div>
        <p style="font-size: 0.8em; color: #666; margin-top: 0;">Si está cerrado, los clientes no podrán enviar pedidos.</p>
    </div>

    </div>

<a href="#" id="btnIrACatalogoAdmin" class="btn-salto-admin">
    <span>📦</span> Ir a Catálogo
</a>

<div id="overlaySecreto" class="overlay-secreto" onclick="cerrarConfig()"></div>
<div id="modalConfigSecreta">
    <h3 style="margin-top:0">⚙️ Enlace del Otro Panel</h3>
    <p style="font-size: 0.8em; color: #666;">Pega el link del Administrador de Catálogo:</p>
    <input type="text" id="nuevoLinkAdmin" placeholder="https://...">
    <button class="btn-save" style="background: var(--verde);" onclick="guardarLinkAdmin()">💾 Actualizar Enlace</button>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyAxWMSIqoS1ZXgAO3rOIiOMCrAaAZjDiao", 
        authDomain: "antojitos-pueblo-nuevo.firebaseapp.com", 
        projectId: "antojitos-pueblo-nuevo", 
        storageBucket: "antojitos-pueblo-nuevo.appspot.com", 
        messagingSenderId: "1006413360329", 
        appId: "1:1006413360329:web:99103e89833729cc2e3118" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    window.onload = () => { escucharPedidos(); escucharRepartidores(); cargarConfig(); };

    // ==========================================
    // LÓGICA DE SALTO Y CONFIGURACIÓN OCULTA
    // ==========================================
    let clicks = 0;
    function detectarClicksSecretos() {
        clicks++;
        if (clicks === 5) {
            document.getElementById('modalConfigSecreta').style.display = 'block';
            document.getElementById('overlaySecreto').style.display = 'block';
            clicks = 0;
        }
        setTimeout(() => { clicks = 0; }, 2000);
    }

    function cerrarConfig() {
        document.getElementById('modalConfigSecreta').style.display = 'none';
        document.getElementById('overlaySecreto').style.display = 'none';
    }

    async function guardarLinkAdmin() {
        const link = document.getElementById('nuevoLinkAdmin').value;
        if(!link) return alert("Ingresa un link válido");
        // Guardamos en el documento "global" para este panel
        await db.collection("configuracion").doc("global").set({ linkAdminCatalogo: link }, { merge: true });
        alert("¡Link de navegación actualizado!");
        cerrarConfig();
    }

    function cargarConfig() {
        db.collection("configuracion").doc("global").onSnapshot(doc => {
            if(doc.exists) {
                const d = doc.data();
                document.getElementById('toggleAbierto').checked = d.abierto || false;
                document.getElementById('estadoTexto').innerText = d.abierto ? "ABIERTO" : "CERRADO";
                document.getElementById('estadoTexto').style.color = d.abierto ? "green" : "red";
                document.getElementById('confTelefonoAdmin').value = d.telefonoAdmin || "";
                document.getElementById('confLinkProductos').value = d.linkProductos || "";
                
                // Actualiza el link del botón de salto
                const linkSalto = d.linkAdminCatalogo || "#";
                document.getElementById('btnIrACatalogoAdmin').href = linkSalto;
                document.getElementById('nuevoLinkAdmin').value = linkSalto;

                // Cargar ejemplos (Omitido aquí por brevedad, pero mantenlo en tu código)
                if(document.getElementById('exMandado')) document.getElementById('exMandado').value = d.ejemploMandado || "";
                if(document.getElementById('exComida')) document.getElementById('exComida').value = d.ejemploComida || "";
                if(document.getElementById('exEmpleo')) document.getElementById('exEmpleo').value = d.ejemploEmpleo || "";
                if(document.getElementById('exOtro')) document.getElementById('exOtro').value = d.ejemploOtro || "";
            }
        });
    }

    // ==========================================
    // TUS FUNCIONES ORIGINALES (NO TOCAR)
    // ==========================================
    async function guardarAjustesRapido() {
        const telAdmin = document.getElementById('confTelefonoAdmin').value.trim();
        const linkProd = document.getElementById('confLinkProductos').value.trim();
        await db.collection("configuracion").doc("global").set({
            abierto: document.getElementById('toggleAbierto').checked,
            telefonoAdmin: telAdmin,
            linkProductos: linkProd,
            ejemploMandado: document.getElementById('exMandado').value.trim(),
            ejemploComida: document.getElementById('exComida').value.trim(),
            ejemploEmpleo: document.getElementById('exEmpleo').value.trim(),
            ejemploOtro: document.getElementById('exOtro').value.trim()
        }, { merge: true });
        alert("Ajustes actualizados.");
    }

    function escucharPedidos() {
        db.collection("pedidos").orderBy("timestamp", "desc").onSnapshot(snap => {
            const cont = document.getElementById('listaPedidos');
            cont.innerHTML = "";
            snap.forEach(doc => {
                const p = doc.data();
                let fechaHora = p.timestamp ? p.timestamp.toDate().toLocaleString('es-NI', { dateStyle: 'medium', timeStyle: 'short' }) : "---";
                cont.innerHTML += `
                    <div class="card pedido-card">
                        <span class="fecha-orden">🕒 ${fechaHora}</span>
                        <b style="color: var(--naranja); font-size: 1.1em;">👤 ${p.cliente || 'Sin nombre'}</b><br>
                        <hr style="border:0; border-top:1px dashed #ddd; margin: 8px 0;">
                        <b>🏷️ Servicio:</b> ${p.tipo || 'N/A'}<br>
                        <b>📝 Detalle:</b> ${p.detalle || 'Sin descripción'}<br>
                        <b>📍 Ubicación:</b> ${p.ubicacion || 'No especificada'}<br>
                        ${p.repartidorAsignado ? `<b>🚴 Asignado a:</b> ${p.repartidorAsignado}<br>` : ''}
                        <br>
                        <button class="btn-borrar" onclick="eliminarPedido('${doc.id}')">Eliminar del Historial</button>
                    </div>`;
            });
        });
    }

    // ... (El resto de funciones: eliminarPedido, eliminarTodoElHistorial, escucharRepartidores, agregar, editar, eliminar repartidor y openTab se mantienen exactamente igual a tu código original)
</script>
</body>
</html>
