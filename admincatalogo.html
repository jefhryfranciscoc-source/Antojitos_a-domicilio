<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Antojitos PN</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        :root { --naranja: #e67e22; --azul: #3498db; --oscuro: #1a252f; --rojo: #e74c3c; --verde: #2ecc71; --fondo: #f0f2f5; }
        body { font-family: sans-serif; background: var(--fondo); margin: 0; padding: 15px; font-size: 14px; }
        .container { max-width: 600px; margin: auto; }
        h1 { text-align: center; cursor: pointer; }
        .seccion-admin { background: white; border-radius: 12px; margin-bottom: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .seccion-header { padding: 15px; cursor: pointer; display: flex; justify-content: space-between; background: #fff; font-weight: bold; }
        .seccion-body { display: none; padding: 15px; border-top: 1px solid #eee; }
        .seccion-admin.abierta .seccion-body { display: block; }
        .grid-form { display: grid; gap: 10px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; background: #fafafa; }
        button { cursor: pointer; border: none; border-radius: 8px; font-weight: bold; padding: 12px; transition: 0.2s; }
        .btn-principal { background: var(--azul); color: white; width: 100%; }
        .item-admin { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
        .btn-mini { padding: 4px 8px; font-size: 10px; margin-left: 4px; }
        .btn-salto-admin { position: fixed; bottom: 15px; right: 15px; background: var(--oscuro); color: white; padding: 12px; border-radius: 50px; text-decoration: none; font-weight: bold; font-size: 12px; z-index: 100; }
        #modalConfigSecreta { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 25px; border-radius: 15px; z-index: 1001; width: 85%; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; }
        .previa-url { width: 100%; height: 100px; object-fit: contain; background: #eee; border-radius: 8px; display: none; margin-top: 5px; }
    </style>
</head>
<body>
<div class="container">
    <h1 onclick="detectarClicksSecretos()">⚙️ Mi Tienda Admin</h1>
    <div class="seccion-admin" id="sec-config">
        <div class="seccion-header" onclick="toggleSeccion('sec-config')"><span>🎨 Cabecera</span><span>▼</span></div>
        <div class="seccion-body"><div class="grid-form">
            <input type="text" id="mensajeCabecera" placeholder="Título">
            <textarea id="textoSugerencia" placeholder="Avisos"></textarea>
            <input type="text" id="linkPedido" placeholder="Link WhatsApp">
            <button class="btn-principal" style="background:var(--verde)" onclick="guardarConfig()">💾 Guardar</button>
        </div></div>
    </div>
    <div class="seccion-admin" id="sec-cat">
        <div class="seccion-header" onclick="toggleSeccion('sec-cat')"><span>📑 Pestañas</span><span>▼</span></div>
        <div class="seccion-body"><div class="grid-form">
            <input type="hidden" id="idCat"><input type="text" id="nombreCat" placeholder="Ej: Bebidas">
            <button class="btn-principal" id="btnCat" onclick="procesarCategoria()">➕ Guardar</button>
            <div id="listaCategoriasAdmin"></div>
        </div></div>
    </div>
    <div class="seccion-admin" id="sec-local">
        <div class="seccion-header" onclick="toggleSeccion('sec-local')"><span>🏘️ Negocios</span><span>▼</span></div>
        <div class="seccion-body"><div class="grid-form">
            <input type="hidden" id="idLocal"><select id="selCatLocal"></select>
            <input type="text" id="nombreLocal" placeholder="Nombre Local"><input type="text" id="emojiLocal" placeholder="Emoji">
            <button class="btn-principal" id="btnLocal" onclick="procesarLocal()">🏘️ Guardar</button>
            <div id="listaLocalesAdmin"></div>
        </div></div>
    </div>
    <div class="seccion-admin" id="sec-prod">
        <div class="seccion-header" onclick="toggleSeccion('sec-prod')"><span>🍔 Menú</span><span>▼</span></div>
        <div class="seccion-body"><div class="grid-form">
            <input type="hidden" id="idProd">
            <select id="selLocalProd"></select>
            <input type="text" id="nombreProd" placeholder="Producto">
            <input type="text" id="precioProd" placeholder="Precio">
            <input type="text" id="urlImagenProd" placeholder="Link de la imagen (URL)" oninput="verPrevia(this.value)">
            <img id="imgPrevia" class="previa-url">
            <textarea id="descProd" placeholder="Descripción"></textarea>
            <input type="text" id="variantesProd" placeholder="Variantes">
            <button class="btn-principal" id="btnProd" onclick="procesarProducto()">🍔 Guardar Producto</button>
            <div id="listaProductosAdmin"></div>
        </div></div>
    </div>
</div>
<a href="#" id="btnIrAPedidosAdmin" class="btn-salto-admin">📝 Pedidos</a>
<div id="overlaySecreto" class="overlay" onclick="cerrarConfig()"></div>
<div id="modalConfigSecreta">
    <h3>Nav Admin</h3><input type="text" id="nuevoLinkAdmin">
    <button class="btn-principal" style="background:var(--verde);margin-top:10px" onclick="guardarLinkAdmin()">💾 Actualizar</button>
</div>
<script>
    const config = { 
        apiKey: "AIzaSyAxWMSIqoS1ZXgAO3rOIiOMCrAaAZjDiao", 
        authDomain: "antojitos-pueblo-nuevo.firebaseapp.com", 
        projectId: "antojitos-pueblo-nuevo", 
        storageBucket: "antojitos-pueblo-nuevo.appspot.com", 
        messagingSenderId: "1006413360329", 
        appId: "1:1006413360329:web:99103e89833729cc2e3118" 
    };
    firebase.initializeApp(config);
    const db = firebase.firestore();
    window.onload = () => { cargarConfig(); listarCategorias(); listarLocales(); listarProductos(); };
    function verPrevia(url) { const img=document.getElementById('imgPrevia'); if(url){img.src=url;img.style.display='block';}else{img.style.display='none';} }
    let clicks = 0; function detectarClicksSecretos(){ clicks++; if(clicks==5){document.getElementById('modalConfigSecreta').style.display='block';document.getElementById('overlaySecreto').style.display='block';} setTimeout(()=>clicks=0,2000); }
    function cerrarConfig(){ document.getElementById('modalConfigSecreta').style.display='none';document.getElementById('overlaySecreto').style.display='none';}
    async function guardarLinkAdmin(){ await db.collection("configuracion").doc("catalogo").set({linkAdminPedidos:document.getElementById('nuevoLinkAdmin').value},{merge:true}); alert("OK"); cerrarConfig(); }
    function cargarConfig() { db.collection("configuracion").doc("catalogo").onSnapshot(doc=>{ if(doc.exists){ const d=doc.data(); document.getElementById('mensajeCabecera').value=d.mensajeCabecera||"";document.getElementById('textoSugerencia').value=d.textoSugerencia||"";document.getElementById('linkPedido').value=d.linkPedido||""; document.getElementById('btnIrAPedidosAdmin').href=d.linkAdminPedidos||"#"; document.getElementById('nuevoLinkAdmin').value=d.linkAdminPedidos||"";}}); }
    function toggleSeccion(id){ const e=document.getElementById(id); const a=e.classList.contains('abierta'); document.querySelectorAll('.seccion-admin').forEach(s=>s.classList.remove('abierta')); if(!a) e.classList.add('abierta'); }
    async function guardarConfig(){ await db.collection("configuracion").doc("catalogo").set({mensajeCabecera:document.getElementById('mensajeCabecera').value,textoSugerencia:document.getElementById('textoSugerencia').value,linkPedido:document.getElementById('linkPedido').value},{merge:true}); alert("Guardado"); }
    async function procesarCategoria(){ const i=document.getElementById('idCat').value, n=document.getElementById('nombreCat').value; if(!n) return; i?await db.collection("categorias").doc(i).update({nombre:n}):await db.collection("categorias").add({nombre:n}); limpiarCat(); }
    function listarCategorias(){ db.collection("categorias").orderBy("nombre").onSnapshot(s=>{ const l=document.getElementById('listaCategoriasAdmin'), sel=document.getElementById('selCatLocal'); l.innerHTML=""; sel.innerHTML=""; s.forEach(d=>{ const c=d.data(); sel.innerHTML+=`<option value="${d.id}">${c.nombre}</option>`; l.innerHTML+=`<div class="item-admin"><span>${c.nombre}</span><div><button class="btn-mini" onclick="editarCat('${d.id}','${c.nombre}')">✏️</button><button class="btn-mini" onclick="eliminar('categorias','${d.id}')">🗑️</button></div></div>`;});}); }
    async function procesarLocal(){ const i=document.getElementById('idLocal').value, d={nombre:document.getElementById('nombreLocal').value,emoji:document.getElementById('emojiLocal').value,categoriaId:document.getElementById('selCatLocal').value}; if(!d.nombre) return; i?await db.collection("locales").doc(i).update(d):await db.collection("locales").add(d); limpiarLocal(); }
    function listarLocales(){ db.collection("locales").onSnapshot(s=>{ const l=document.getElementById('listaLocalesAdmin'), sel=document.getElementById('selLocalProd'); l.innerHTML=""; sel.innerHTML=""; s.forEach(d=>{ const o=d.data(); sel.innerHTML+=`<option value="${d.id}">${o.nombre}</option>`; l.innerHTML+=`<div class="item-admin"><span>${o.emoji}${o.nombre}</span><div><button class="btn-mini" onclick="editarLocal('${d.id}','${o.nombre}','${o.emoji}','${o.categoriaId}')">✏️</button><button class="btn-mini" onclick="eliminar('locales','${d.id}')">🗑️</button></div></div>`;});}); }
    async function procesarProducto(){ const i=document.getElementById('idProd').value, b=document.getElementById('btnProd'), u=document.getElementById('urlImagenProd').value; if(!document.getElementById('nombreProd').value) return alert("Nombre!"); b.disabled=true; try{ const data={localId:document.getElementById('selLocalProd').value,nombre:document.getElementById('nombreProd').value,precio:document.getElementById('precioProd').value,descripcion:document.getElementById('descProd').value,variantes:document.getElementById('variantesProd').value,urlImagen:u||""}; i?await db.collection("productos").doc(i).update(data):await db.collection("productos").add(data); limpiarProd(); alert("Listo"); }catch(e){alert(e.message);}finally{b.disabled=false;} }
    function listarProductos(){ db.collection("productos").onSnapshot(s=>{ const l=document.getElementById('listaProductosAdmin'); l.innerHTML=""; s.forEach(d=>{ const p=d.data(); l.innerHTML+=`<div class="item-admin"><span>${p.urlImagen?'🖼️':''} ${p.nombre}</span><div><button class="btn-mini" onclick="editarProd('${d.id}',\`${p.nombre}\`,'${p.precio}',\`${p.descripcion||''}\`,'${p.localId}','${p.variantes||''}','${p.urlImagen||''}')">✏️</button><button class="btn-mini" onclick="eliminar('productos','${d.id}')">🗑️</button></div></div>`;});}); }
    function eliminar(c,i){ if(confirm("Borrar?")) db.collection(c).doc(i).delete(); }
    function editarCat(i,n){ document.getElementById('idCat').value=i; document.getElementById('nombreCat').value=n; }
    function editarLocal(i,n,e,c){ document.getElementById('idLocal').value=i; document.getElementById('nombreLocal').value=n; document.getElementById('emojiLocal').value=e; document.getElementById('selCatLocal').value=c; }
    function editarProd(i,n,p,d,l,v,u){ document.getElementById('idProd').value=i; document.getElementById('nombreProd').value=n; document.getElementById('precioProd').value=p; document.getElementById('descProd').value=d; document.getElementById('selLocalProd').value=l; document.getElementById('variantesProd').value=v; document.getElementById('urlImagenProd').value=u; verPrevia(u); }
    function limpiarCat(){ document.getElementById('idCat').value=""; document.getElementById('nombreCat').value=""; }
    function limpiarLocal(){ document.getElementById('idLocal').value=""; document.getElementById('nombreLocal').value=""; document.getElementById('emojiLocal').value=""; }
    function limpiarProd(){ document.getElementById('idProd').value=""; document.getElementById('nombreProd').value=""; document.getElementById('precioProd').value=""; document.getElementById('descProd').value=""; document.getElementById('variantesProd').value=""; document.getElementById('urlImagenProd').value=""; verPrevia(""); }
</script>
</body>
</html>
